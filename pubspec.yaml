name: simple_bloc_todo_app
description: "Simple Todo App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  get_it: ^9.2.1
  dio: ^5.3.2
  dartz: ^0.10.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  go_router: ^17.1.0
  connectivity_plus: ^7.0.0
  fluttertoast: ^9.0.0
  share_plus: ^12.0.1
  talker_dio_logger: ^5.1.16
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  bloc_test: ^10.0.0
  mockito: ^5.4.2
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
